{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.12.0",
    "install": {
      "postgresql_16": {
        "pkg-path": "postgresql_16"
      },
      "python312": {
        "pkg-path": "python312"
      }
    },
    "vars": {
      "DATABASE_URL": "postgresql://postgres@127.0.0.1:5433/postgres",
      "PGPORT": "5433",
      "SIGNING_KEY": "dev-demo-key"
    },
    "hook": {
      "on-activate": "  # Resolve the project root (the dir that contains this flox env) and the\n  # shared app one level up. FLOX_ENV_PROJECT points at three-ways/flox.\n  export APP_ROOT=\"$(cd \"$FLOX_ENV_PROJECT/..\" && pwd)\"\n  export PGDATA=\"$FLOX_ENV_CACHE/pgdata\"\n  export VENV=\"$FLOX_ENV_CACHE/venv\"\n\n  # First-run: create the Postgres cluster (trust auth — local dev only).\n  if [ ! -d \"$PGDATA\" ]; then\n    echo \"→ initializing Postgres cluster at $PGDATA\"\n    initdb -U postgres --auth=trust -D \"$PGDATA\" >/dev/null\n    {\n      echo \"listen_addresses = '127.0.0.1'\"\n      echo \"port = $PGPORT\"\n      echo \"unix_socket_directories = '$FLOX_ENV_CACHE'\"\n    } >> \"$PGDATA/postgresql.conf\"\n  fi\n\n  # First-run: create the venv and install the *pinned* Python deps. Because\n  # python, libpq, OpenSSL and libjpeg all come from this env, pip finds\n  # everything it needs with zero extra environment variables.\n  if [ ! -d \"$VENV\" ]; then\n    echo \"→ creating venv + installing pinned deps\"\n    python -m venv \"$VENV\"\n    \"$VENV/bin/pip\" install -q --upgrade pip\n    \"$VENV/bin/pip\" install -q -r \"$APP_ROOT/app/requirements.txt\"\n  fi\n  export PATH=\"$VENV/bin:$PATH\"\n\n  echo \"→ thumbprint env ready — python $(python --version 2>&1 | cut -d' ' -f2), postgres $(postgres --version | grep -oE '[0-9]+\\\\.[0-9]+' | head -1)\"\n  echo \"  start the stack:  flox activate --start-services\"\n  echo \"  then:             curl -F file=@app/sample.jpg localhost:8000/thumbnail\"\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-darwin",
        "x86_64-linux"
      ]
    },
    "services": {
      "api": {
        "command": "cd $APP_ROOT && $VENV/bin/uvicorn app.main:app --host 127.0.0.1 --port 8000"
      },
      "postgres": {
        "command": "postgres -D $PGDATA"
      }
    },
    "containerize": {
      "config": {
        "user": "1000:1000",
        "exposed-ports": [
          "8000/tcp"
        ],
        "cmd": [
          "bash",
          "-lc",
          "cd \"$APP_ROOT\" && \"$VENV/bin/uvicorn\" app.main:app --host 0.0.0.0 --port 8000"
        ]
      }
    }
  },

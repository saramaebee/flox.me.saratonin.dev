{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.12.0",
    "install": {
      "bun": {
        "pkg-path": "bun"
      }
    },
    "vars": {
      "INTRO_MESSAGE": "flox.me.saratonin.dev — reproducible by construction"
    },
    "hook": {
      "on-activate": "  echo \"→ $INTRO_MESSAGE\"\n  echo \"  bun $(bun --version)\"\n  if [ ! -d \"$FLOX_ENV_PROJECT/node_modules\" ]; then\n    echo \"→ installing JS dependencies with bun…\"\n    ( cd \"$FLOX_ENV_PROJECT\" && bun install )\n  fi\n  echo \"  dev:   bun run dev     build: flox build site  (or: bun run build)\"\n"
    },
    "profile": {},
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-darwin",
        "x86_64-linux"
      ]
    },
    "build": {
      "site": {
        "command": "  rm -rf public\n  bun install --frozen-lockfile\n  bun build ./src/index.html --outdir=public --minify --public-path=/\n  mkdir -p $out\n  cp -r public/* $out/\n  cp CNAME $out/\n",
        "version": "1.0.0",
        "description": "Static build of flox.me.saratonin.dev"
      }
    }
  },
